name: Build Minecraft Mod from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Instalar unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extrair mod.zip
        run: |
          unzip mod.zip -d source

      - name: Encontrar diretório do projeto
        run: |
          PROJECT_DIR=$(find source -name "gradlew" -exec dirname {} \; | head -n 1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Dar permissão ao Gradle
        run: chmod +x "$PROJECT_DIR/gradlew"

      - name: Compilar
        run: |
          cd "$PROJECT_DIR"
          ./gradlew build --no-daemon

      - name: Enviar JAR
        uses: actions/upload-artifact@v4
        with:
          name: Compiled-Mod
          path: ${{ env.PROJECT_DIR }}/build/libs/*.jar
