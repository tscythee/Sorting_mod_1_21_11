name: Build Mod (Correção Automática)
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip and Fix Structure
        run: |
          unzip scythe-sorting-v3.zip
          # Procura onde está o build.gradle e move tudo para a raiz
          BASE_DIR=$(find . -name "build.gradle" -exec dirname {} \;)
          echo "Projeto encontrado em: $BASE_DIR"
          cp -r $BASE_DIR/* .
          chmod +x gradlew

      - name: Auto-Fix Code (Erro de Category)
        run: |
          # Corrigindo o erro de 'Category' que o Minecraft 1.21.11 exige
          FILE="src/main/java/com/scythe/sorting/ScytheSortingClient.java"
          sed -i 's/new KeyMapping(/new net.minecraft.client.KeyMapping("key.scythe-sorting.sort", com.mojang.blaze3d.platform.InputConstants.Type.KEYSYM, org.lwjgl.glfw.GLFW.GLFW_KEY_R, "key.categories.inventory") \/\/ /g' $FILE
          
          # Corrigindo o Accessor que o compilador às vezes perde
          mkdir -p src/main/java/com/scythe/sorting/mixin
          cat <<EOF > src/main/java/com/scythe/sorting/mixin/AbstractContainerScreenAccessor.java
          package com.scythe.sorting.mixin;
          import net.minecraft.client.gui.screens.inventory.AbstractContainerScreen;
          import net.minecraft.world.inventory.Slot;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.gen.Accessor;
          @Mixin(AbstractContainerScreen.class)
          public interface AbstractContainerScreenAccessor {
              @Accessor("hoveredSlot")
              Slot scythe_getSlotUnderMouse();
          }
          EOF

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew build --stacktrace

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Scythe-Sorting-Jar-FINAL
          path: build/libs/*.jar
          
